<section class="dashboard">
  <header class="dashboard__header">
    <div>
      <h1>{{ 'dashboard.title' | transloco }}</h1>
      <p>{{ 'dashboard.subtitle' | transloco }}</p>
    </div>
  </header>

  <div class="dashboard__calculators">
    <section class="dashboard__calculator">
      <h2>{{ 'positionSize.title' | transloco }}</h2>
      <app-position-size-calculator [showHeader]="false" [compact]="true" />
    </section>
  </div>
</section>
